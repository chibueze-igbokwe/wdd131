<!-- place.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigeria - Country Page - Igbokwe Chibueze</title>
    <meta name="description" content="Information and weather data for Nigeria, WDD 131 assignment.">
    <meta name="author" content="Igbokwe Chibueze">
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Nigeria</h1>
    </header>
    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
                <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
                <img src="images/hero-small.webp" alt="Lagos Cityscape" width="500" height="250">
            </picture>
            <section class="data">
                <h2>Data</h2>
                <ul>
                    <li><strong>Area:</strong> 923,768 sq km</li>
                    <li><strong>Population:</strong> 218 Million</li>
                    <li><strong>Capital:</strong> Abuja</li>
                    <li><strong>Languages:</strong> English, Hausa, Yoruba, Igbo</li>
                    <li><strong>Currency:</strong> Naira (₦)</li>
                </ul>
            </section>
        </div>

        <section class="weather">
            <h2>Weather</h2>
            <div class="weather-content">
                <img src="images/weather-icon.svg" alt="Sunny Icon" class="weather-icon">
                <p><strong>Temperature:</strong> <span id="temp">28</span>°C</p>
                <p><strong>Conditions:</strong> Partly Cloudy</p>
                <p><strong>Wind:</strong> <span id="wind">10</span> km/h</p>
                <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> | Igbokwe Chibueze | Nigeria</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
