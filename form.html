<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Review Form</title>

  <meta name="description" content="Submit a product review including rating, installation date, and feedback.">
  <meta name="author" content="Chibueze Igbokwe">

  <link rel="stylesheet" href="styles/form.css">

  <script defer src="scripts/form.js"></script>
</head>

<body>

<header>
  <h1>Product Review Form</h1>
</header>

<main>
  <form method="get" action="review.html">

    <!-- PRODUCT NAME -->
    <label for="product">Product Name *</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    <!-- RATING -->
    <fieldset>
      <legend>Overall Rating *</legend>
    
      <div>
        <input type="radio" id="r1" name="rating" value="1" required>
        <label for="r1">☆</label>
      </div>
    
      <div>
        <input type="radio" id="r2" name="rating" value="2" required>
        <label for="r2">☆☆</label>
      </div>
    
      <div>
        <input type="radio" id="r3" name="rating" value="3" required>
        <label for="r3">☆☆☆</label>
      </div>
    
      <div>
        <input type="radio" id="r4" name="rating" value="4" required>
        <label for="r4">☆☆☆☆</label>
      </div>
    
      <div>
        <input type="radio" id="r5" name="rating" value="5" required>
        <label for="r5">☆☆☆☆☆</label>
      </div>
    
    </fieldset>

    <!-- DATE -->
    <label for="date">Date of Installation *</label>
    <input type="date" id="date" name="date" required>

    <!-- FEATURES -->
    <fieldset>
      <legend>Useful Features</legend>
    
      <div>
        <input type="checkbox" id="speed" name="features" value="speed">
        <label for="speed">Speed</label>
      </div>
    
      <div>
        <input type="checkbox" id="design" name="features" value="design">
        <label for="design">Design</label>
      </div>
    
      <div>
        <input type="checkbox" id="durability" name="features" value="durability">
        <label for="durability">Durability</label>
      </div>
    
      <div>
        <input type="checkbox" id="battery" name="features" value="battery">
        <label for="battery">Battery Life</label>
      </div>
    
    </fieldset>

    <!-- REVIEW -->
    <label for="review">Written Review</label>
    <textarea id="review" name="review"></textarea>

    <!-- NAME -->
    <label for="username">Your Name</label>
    <input type="text" id="username" name="username">

    <!-- SUBMIT -->
    <input type="submit" value="Submit Review">

  </form>
</main>

<footer>
  <p>&copy; 2026 Product Review System</p>
</footer>

</body>
</html>
